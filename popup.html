<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    body {
      width: 250px;
      padding: 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      box-sizing: border-box;
    }
    h3 {
      margin: 0 0 14px 0;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .status-box {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .tab-info {
      font-size: 10px;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #stateText {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .setting {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #1e293b;
      color: #f8fafc;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
    }
    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      font-weight: 600;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(99, 102, 241, 0.4);
    }
    button:active {
      transform: translateY(1px);
    }
    button.active {
      background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
      box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
    }
    button.active:hover {
      box-shadow: 0 6px 14px rgba(244, 63, 94, 0.4);
    }
  </style>
</head>
<body>
  <h3>Tab Jiggler v1.2.0</h3>
  <div class="status-box">
    <div class="tab-info">Current Tab Status:</div>
    <div id="stateText">Checking...</div>
  </div>
  
  <div class="setting">
    <label>Interval (Seconds)</label>
    <select id="intervalSelect">
      <option value="random" selected>Random (2 - 7 Seconds)</option>
      <option value="2000">2 Seconds</option>
      <option value="3000">3 Seconds</option>
      <option value="4000">4 Seconds</option>
      <option value="5000">5 Seconds</option>
    </select>
  </div>

  <div class="setting">
    <label>Custom Image URL</label>
    <input type="text" id="imgUrl" placeholder="Optional URL">
  </div>

  <button id="toggleBtn">Enable for this Tab</button>

  <script src="popup.js"></script>
</body>
</html>
